<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Jared Viernes | Web Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="background"></div>
    <div class="container"></div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>
    window.addEventListener("DOMContentLoaded", () => {
      VANTA.WAVES({
        el: "#background",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200,
        minWidth: 200,
        scale: 1,
        scaleMobile: 1,
        color: 0x3c3c3c,
        shininess: 51,
        waveHeight: 11,
        waveSpeed: 0.3,
        zoom: 0.65
      });
    });
    </script>

    <header class="header">
        <div class="logo">
            <a href="index.html">Dan Jared Viernes</a>
        </div>
   
        <nav>
            <a href="about.html" class="active">About</a>
            <a href="certifications.html">Certifications</a>
            <a href="tech-stack.html">Tech Stack</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>


   
   <section id="certifications" class="section">
    <h2 class="certification">Certifications</h2> 

    <div class="cert">

        <!-- CERT 1 -->
        <div class="certificate">
            <img src="images/certifcates/cert1.jpg" class="cert-img">

            <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" class="cert-info">
                <p class="cert-name">PowerPoint Associate Certificate</p>
                <p class="cert-date">May 16, 2025</p>
            </a>
        </div>

        <!-- CERT 2 -->
        <div class="certificate">
            <img src="images/certifcates/cert2.jpg" class="cert-img">

            <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" class="cert-info">
                <p class="cert-name">Word Associate Certificate</p>
                <p class="cert-date">February 14, 2025</p>
            </a>
        </div>

    </div>
</section>

<!-- MODAL (ENLARGE IMAGE) -->
<div id="imgModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.querySelector(".close");

    const images = document.querySelectorAll(".cert-img");

    images.forEach(img => {
        img.addEventListener("click", function () {
            modal.style.display = "block";
            modalImg.src = this.src;
        });
    });

    closeBtn.addEventListener("click", function () {
        modal.style.display = "none";
    });

    modal.addEventListener("click", function (e) {
        if (e.target === modal) {
            modal.style.display = "none";
        }
    });

});
</script>
   
</body>
</html>
