<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Dan Jared Viernes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="background"></div>

    <header class="header">
        <div class="logo">
            <a href="index.html">Dan Jared Viernes</a>
        </div>

        <nav>
            <a href="about.html" class="active">About</a>
            <a href="certifications.html">Certifications</a>
            <a href="tech-stack.html">Tech Stack</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section id="certifications" class="section">

        <h2 class="certification">Certifications</h2>

        <div class="cert">

            <!-- CERT 1 -->
            <div class="certificate">
                <img src="images/certifcates/cert1.jpg" class="cert-img">

                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                   class="cert-info">

                    <p class="cert-name">
                        PowerPoint Associate Certificate
                    </p>

                    <p class="cert-verify">
                        Verify Here
                    </p>
                </a>
            </div>

            <!-- CERT 2 -->
            <div class="certificate">
                <img src="images/certifcates/cert2.jpg" class="cert-img">

                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                   class="cert-info">

                    <p class="cert-name">
                        Word Associate Certificate
                    </p>

                    <p class="cert-verify">
                        Verify Here
                    </p>

                </a>
            </div>

        </div>
    </section>

    <!-- IMAGE MODAL -->
    <div id="imgModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
