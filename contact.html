<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Jared Viernes | Web Portfolio</title>
    <link rel="stylesheet" href="style.css">

<body>

    <div id="background"></div>
    <div class="container"></div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>
    window.addEventListener("DOMContentLoaded", () => {
      VANTA.WAVES({
        el: "#background",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200,
        minWidth: 200,
        scale: 1,
        scaleMobile: 1,
        color: 0x3c3c3c,
        shininess: 51,
        waveHeight: 11,
        waveSpeed: 0.3,
        zoom: 0.65
      });
    });
    </script>

    <header class="header">
        <div class="logo">
            <a href="index.html">Dan Jared Viernes</a>
        </div>
   
        <nav>

            <a href="tech-stack.html">Tech Stack</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

     <h2>Contacts</h2>

        If you want to stalk me, heres my accounts
    </p>

            LinkedIn
        </a>

</section>
