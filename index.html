        <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
        <script>
        window.addEventListener("DOMContentLoaded", () => {
          VANTA.WAVES({
            el: "#background",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200, 
            minWidth: 200,
            scale: 1,
            scaleMobile: 1,
            color: 0x3c3c3c,
            shininess: 150,
            waveHeight: 29,
            waveSpeed: 1.75,
            zoom: 0.65
          });
        });
        </script>
